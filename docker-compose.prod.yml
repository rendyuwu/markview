services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3344:3344"
    env_file:
      - .env.production
    depends_on:
      db:
        condition: service_healthy
    networks:
      - markview

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: markview
      POSTGRES_USER: ${POSTGRES_USER:-markview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env.production}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-markview} -d markview"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - markview

volumes:
  pgdata:

networks:
  markview:
    driver: bridge
